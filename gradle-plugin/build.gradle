plugins {
    id 'java-gradle-plugin'
    id 'maven-publish'
    id 'io.freefair.lombok' version '8.7.1'
}

group = 'dev.anvilcraft.resource'
version = '1.0.0'

repositories {
    mavenCentral()
    mavenLocal()
    maven {
        name = "Mojang"
        url = uri("https://libraries.minecraft.net")
    }
}

dependencies {
    // Gradle API
    implementation gradleApi()

    // 插件需要引用 processor 中的注解类（用 compileOnly，运行时由用户项目提供）
    if (System.getenv("NOT_DEV") == 'true') {
        compileOnly 'dev.anvilcraft.resource:cuminum-processor:latest.release'
    } else {
        compileOnly project(':cuminum-processor')
    }
}

gradlePlugin {
    plugins {
        cuminumPlugin {
            id = 'dev.anvilcraft.resource.cuminum'
            implementationClass = 'dev.anvilcraft.resource.cuminum.gradle.CuminumPlugin'
            displayName = 'Cuminum Gradle Plugin'
            description = 'Gradle plugin to run Cuminum annotation processor and expose generated sources, similar to Lombok\'s delombok'
        }
    }
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.addAll(
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED'
    )
}

tasks.register('sourcesJar', Jar) {
    from delombok.outputs.files
    dependsOn delombok
    archiveClassifier = "sources"
}

artifacts {
    archives tasks.jar
    archives tasks.sourcesJar
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = project.group
            artifactId = project.base.archivesName.get()
            version = project.version

            from components.java

            artifact sourcesJar
        }
    }

    // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
    repositories {
        // Add repositories to publish to here.
        def MAVEN_URL = System.getenv("MAVEN_URL")
        if (MAVEN_URL != null) {
            maven {
                url MAVEN_URL
                credentials {
                    username System.getenv("MAVEN_USERNAME")
                    password System.getenv("MAVEN_PASSWORD")
                }
            }
        } else {
            mavenLocal()
        }
    }
}

lombok {
    version = "1.18.44"
}
